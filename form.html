<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Product Review Form Assignment">
    <meta name="author" content="Chinweuba Ogugbue">

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
</head>
<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">

            <div class="form-group">
                <label for="productName">Product Name *</label>

                <select id="productName" name="productName" required>
                    <option value="" disabled selected>
                        Select a Product ...
                    </option>
                </select>
            </div>

            <fieldset>
                <legend>Overall Rating *</legend>

                <div class="rating">
                    <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1">☆</label>

                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2">☆☆</label>

                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3">☆☆☆</label>

                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4">☆☆☆☆</label>

                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5">☆☆☆☆☆</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">
                    Date of Installation *
                </label>

                <input
                    type="date"
                    id="installDate"
                    name="installDate"
                    required
                >
            </div>

            <fieldset>
                <legend>Useful Features</legend>

                <div class="checkbox-group">
                    <input type="checkbox" id="durability" name="features" value="Durability">
                    <label for="durability">Durability</label>

                    <input type="checkbox" id="ease" name="features" value="Ease of Use">
                    <label for="ease">Ease of Use</label>

                    <input type="checkbox" id="performance" name="features" value="Performance">
                    <label for="performance">Performance</label>

                    <input type="checkbox" id="design" name="features" value="Design">
                    <label for="design">Design</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="review">
                    Written Review (Optional)
                </label>

                <textarea
                    id="review"
                    name="review"
                    rows="5"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="userName">
                    Your Name (Optional)
                </label>

                <input
                    type="text"
                    id="userName"
                    name="userName"
                >
            </div>

            <input
                type="submit"
                value="Submit Review"
                class="submit-btn"
            >

        </form>
    </main>

    <footer>
        <p>
            &copy; <span id="currentyear"></span>
            🌸 Chinweuba Ogugbue 🌸 Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
