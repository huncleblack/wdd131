<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazyload Images</title>
    <meta name="description" content="This Site Is For The Sake Of Learning Image Lazyload Methods  ">
    <meta name="author" content="Chinweuba Ogugbue">

    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>

<body>
    <main>
        <h1>Lazy Load Images</h1>

        <div class="images">
            <img src="images/blue-water.jpg" width="500" height="600" loading="lazy">

            <img src="images/elephant.jpg" width="500" height="600" loading="lazy">
            <img src="images/nigeria1.webp" width="500" height="600" loading="lazy">
            <img src="images/picture.jpg" width="500" height="600" loading="lazy">
            <img src="images/sunny-wheather.jpg" width="500" height="600" loading="lazy">

        </div>
    </main>


    <footer>
        <p>&copy; <span id="year"></span> Lazy Load Images. All rights reserved.</p>

    </footer>
    
</body>
</html>
